services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: goodmeet
      POSTGRES_USER: goodmeet
      POSTGRES_PASSWORD: goodmeet
      TZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodmeet -d goodmeet"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - goodmeet-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - goodmeet-redis-data:/data

volumes:
  goodmeet-postgres-data:
  goodmeet-redis-data:
