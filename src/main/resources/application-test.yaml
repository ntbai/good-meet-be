spring:
  application:
    name: good-meet
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
  modulith:
    detection-strategy: explicitly-annotated

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

application:
  cors:
    allowed-origins: http://localhost:3000
  identity:
    tokens:
      issuer: good-meet-backend
      audience: good-meet-api
      access-token-ttl: 15m
      secret: test-only-platform-secret-not-for-production
  participant:
    guest-token:
      issuer: good-meet-backend
      audience: good-meet-guest
      token-ttl: 30m
      secret: test-only-guest-secret-not-for-production-now
  livekit:
    url: wss://livekit.test.invalid
    api-key: test-key
    api-secret: test-only-livekit-secret-not-for-production-now
    token-ttl: 5m
    room-prefix: goodmeet-

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
