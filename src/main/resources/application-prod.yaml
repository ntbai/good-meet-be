spring:
  application:
    name: good-meet
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
  modulith:
    detection-strategy: explicitly-annotated

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${OPENAPI_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${OPENAPI_ENABLED:false}

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  identity:
    tokens:
      issuer: good-meet-backend
      audience: good-meet-api
      access-token-ttl: 15m
      secret: ${PLATFORM_JWT_SECRET}
  participant:
    guest-token:
      issuer: good-meet-backend
      audience: good-meet-guest
      token-ttl: 30m
      secret: ${GUEST_JWT_SECRET}
  livekit:
    url: ${LIVEKIT_URL}
    api-key: ${LIVEKIT_API_KEY}
    api-secret: ${LIVEKIT_API_SECRET}
    token-ttl: 5m
    room-prefix: goodmeet-

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
